# 128-byte fixed response (standard nginx, no lua). wrk POST still receives 128B.
worker_processes 4;
worker_rlimit_nofile 65535;
error_log /dev/null crit;
pid /tmp/nginx_echo_static.pid;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    access_log off;
    keepalive_timeout 75;
    keepalive_requests 1000000;
    sendfile on;
    tcp_nopush on;

    server {
        listen 19003;
        server_name localhost;

        location /ping {
            return 200 'ok';
        }

        location /echo {
            default_type application/octet-stream;
            return 200 'EEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEEE';
        }
    }
}
