# =============================================================================
# Ledis 完整配置示例（覆盖 LedisSettings 全部字段）
# =============================================================================
#
# 【加载优先级】（后者覆盖前者）
#   1. 结构体默认值
#   2. 本文件 或  -c conf  或  --config PATH  指定的 YAML
#   3. 命令行长选项 / positional（host port --async 等）
#
# 【自动加载路径】
#   构建后：<可执行文件目录>/conf/ledis.yaml
#   源码：  ledis/conf/ledis.yaml
#
# 【仅 CLI、不写进 YAML 的项】
#   -s              显式前台（默认即前台，与不加 -d 等价）
#   -d              守护进程；worker 异常退出 5 秒后自动重启
#   -p / -h         打印帮助
#   --pidfile PATH  pid 文件路径（默认 <dir>/ledis.pid）
#
# 【启动示例】
#   ./bin/Ledis/ledis-server                          # 自动加载 conf/ledis.yaml
#   ./bin/Ledis/ledis-server -c conf                  # 指定配置目录
#   ./bin/Ledis/ledis-server --config conf/ledis.yaml 0.0.0.0 6379 --async
#   ./bin/Ledis/ledis-server -d --dir /data/ledis
#
# 详细说明：docs/ledis/configuration.md
# =============================================================================

# ── 网络监听 ────────────────────────────────────────────────────────────────
server:
  # 绑定 IP/主机名。传给 TcpServer::bind。
  # 默认：127.0.0.1 | CLI：第一个 positional | CONFIG：不可改
  host: 127.0.0.1

  # TCP 监听端口。设为 0 时由 OS 分配临时端口（测试用 boundPort() 获取）。
  # 默认：6379 | CLI：host 后的 positional | CONFIG GET：只读
  port: 6379

# ── IO 线程数 ───────────────────────────────────────────────────────────────
# 与下方 ledis.io_threads 映射同一字段；两处任填其一即可，ledis.* 优先于 io.*
io:
  # WorkerGroup 中 IO 协程/worker 数量。仅在 single_thread_mode=false（--async）时生效。
  # 默认：1 | CLI：--io-threads N | CONFIG：不可改
  threads: 1

# ── Ledis 核心配置 ──────────────────────────────────────────────────────────
ledis:

  # ── 并发模型 ──────────────────────────────────────────────────────────────

  # 是否单线程模式。
  #   true  → IO 读包、命令 dispatch、写回在同协程完成（开发调试推荐）
  #   false → IO/DB 分离：IO 入队 MPSC → DB 线程执行 → SPSC 回包（高并发推荐）
  # 默认：true | CLI：默认单线程；加 --async 即为 false | CONFIG：不可改
  single_thread_mode: true

  # IO worker 线程/协程数（与 io.threads 相同）。解析为 0 时启动前强制改为 1。
  # 默认：1 | CLI：--io-threads N
  io_threads: 1

  # 允许的最大 TCP 连接数。达到上限后新连接立即关闭。
  # 0 表示不限制。
  # 默认：10000 | CLI：--maxclients N | CONFIG GET/SET
  maxclients: 10000

  # 异步模式下 IO→DB 的 InboundQueue 容量。队列满返回 ERR command queue full。
  # 默认：65536（1024×64）| CLI：无 | CONFIG：不可改
  max_pending_commands: 65536

  # 单连接读缓冲（ChainBuffer）上限，单位字节。超限断开并返回 ERR query buffer limit。
  # 0 表示不限制。
  # 默认：1048576（1 MiB）| CLI：无 | CONFIG：不可改
  query_buffer_limit: 1048576

  # ── 内存与淘汰 ────────────────────────────────────────────────────────────

  # 进程最大内存估算上限（字节）。超出后按 maxmemory_policy 淘汰 key。
  # 0 表示不限制。INFO memory 段可查看 used_memory。
  # 默认：0 | CLI：--maxmemory N | CONFIG GET/SET
  maxmemory: 0

  # 内存满时的淘汰策略（大小写不敏感，下划线可写为连字符）：
  #   allkeys-lru    所有 key，按 LRU 淘汰
  #   volatile-lru   仅带 TTL 的 key，LRU
  #   allkeys-lfu    所有 key，按 LFU 淘汰
  #   volatile-lfu   仅带 TTL 的 key，LFU
  # 默认：allkeys-lru | CLI：--maxmemory-policy | CONFIG GET/SET
  maxmemory_policy: allkeys-lru

  # ── 安全 ──────────────────────────────────────────────────────────────────

  # 连接密码。非空时客户端须先 AUTH，否则除 AUTH/PING/ECHO 外返回 -NOAUTH。
  # 空字符串表示无密码。
  # 默认："" | CLI：--requirepass PASS | CONFIG GET/SET
  requirepass: ""

  # ── 过期 ──────────────────────────────────────────────────────────────────

  # DB 工作线程是否周期性执行主动过期（扫描并删除过期 key）。
  # 单线程模式下 DB worker 未启动，主要依赖 GET 等路径的惰性删除。
  # 默认：true | CLI：无 | CONFIG：不可改
  active_expire_enabled: true

  # 每次主动过期周期中，每个逻辑 DB 最多扫描/删除的 key 数量上限。
  # 默认：20 | CLI：无 | CONFIG：不可改
  active_expire_cycle_keys: 20

  # ── RDB-lite 快照持久化 ───────────────────────────────────────────────────

  # 工作目录。启动时 Application 会 chdir 到此目录；RDB/AOF/pid 文件均相对此路径。
  # 启动时若目录不存在会自动创建。
  # 默认："." | CLI：--dir PATH | CONFIG GET/SET
  dir: .

  # RDB-lite 快照文件名（非 Redis 原生 RDB 格式，魔数 LEDIS003）。
  # 完整路径：dir/dbfilename。SAVE/BGSAVE 先写 .tmp 再 rename 原子替换。
  # 启动时若文件存在则加载，不存在则跳过。
  # 默认：dump.ledis | CLI：--dbfilename NAME | CONFIG GET/SET
  dbfilename: dump.ledis

  # ── AOF-lite 追加日志持久化 ───────────────────────────────────────────────

  # 是否开启 AOF。true 时启动重放已有 AOF，之后每条写命令追加到文件。
  # AOF 格式魔数 LEDIS-AOF1，非 Redis 原生 AOF。
  # 默认：false | CLI：--appendonly | CONFIG GET/SET（yes/no）
  appendonly: false

  # AOF 文件名。完整路径：dir/appendfilename。
  # 默认：appendonly.aof | CLI：--appendfilename NAME | CONFIG GET/SET
  appendfilename: appendonly.aof

  # AOF 刷盘策略：
  #   always   每条写命令后 fsync（最安全，最慢）
  #   everysec 最多每秒 fsync 一次（默认，均衡）
  #   no       仅 fflush，落盘时机由 OS 决定（最快，可能丢最近写入）
  # 默认：everysec | CLI：--appendfsync | CONFIG GET/SET
  # BGREWRITEAOF：后台从内存快照重写 AOF，并合并重写期间的增量命令
  appendfsync: everysec
