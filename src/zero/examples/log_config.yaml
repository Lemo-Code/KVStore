# Zero 日志系统配置示例
# 用法: LogConfig::LoadFromYamlFile("log_config.yaml")
# 或者通过 Config 系统: Config::LoadFromYaml("log_config.yaml")

log:
  # 根日志器级别: TRACE | DEBUG | INFO | WARN | ERROR | FATAL | OFF
  root_level: DEBUG

  # 全局格式 (可选, 默认: "%d{%Y-%m-%d %H:%M:%S} [%p] [%t] [%F:%l] %m%n")
  # 支持的格式符:
  #   %d{时间格式}  - 时间戳
  #   %p            - 日志级别
  #   %t            - 线程ID
  #   %F            - Fiber/Coroutine ID
  #   %N            - Logger 名称
  #   %f            - 源文件名
  #   %l            - 源行号
  #   %m            - 日志消息
  #   %n            - 换行
  #   %X{key}       - MDC 值
  #   %C            - ANSI 颜色
  #   %%            - 百分号
  pattern: "%d{%H:%M:%S} [%p] [%N] %m%n"

  # 输出器列表
  appenders:
    # 控制台输出 (带颜色)
    - type: console
      color: true
      pattern: "%C%d{%H:%M:%S} [%p] [%N] %m%n\033[0m"

    # 文件输出 (带轮转)
    - type: file
      file: /tmp/zero.log
      max_size: 104857600    # 100 MB 后轮转
      max_files: 10          # 保留最近 10 个文件
      pattern: "%d{%Y-%m-%d %H:%M:%S} [%p] [%t] [%F:%l] %m%n"
      level: DEBUG            # 只输出 DEBUG 及以上

  # 子 Logger 级别覆盖
  loggers:
    zero.reactor:
      level: TRACE            # reactor 模块用 TRACE 级别 (详细)
    zero.scheduler:
      level: INFO             # scheduler 模块用 INFO 级别
    zero.net:
      level: DEBUG
