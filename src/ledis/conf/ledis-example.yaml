#   log:
#     level: WARN
#   server:
#     port: 6379
#     bind: 192.168.1.100
#     requirepass: "AdminStr0ngP@ss!"
#   acl:
#     users:
#       readonly: "reader123"
#       app1:     "app1_secret"
#   aof:
#     path: /data/ledis/appendonly.aof
#     mode: everysec
#   eviction:
#     maxmemory: 2147483648   # 2GB
#     policy: volatile-lru
#   slowlog:
#     max_len: 256
#     threshold_us: 5000

# --- 3. 集群节点 1 (首个节点, 自建集群) ---
# ledis:
#   server:
#     port: 6379
#     io_threads: 1
#   cluster:
#     enabled: true
#     port: 16379
#     gossip_interval_ms: 1000
#     node_timeout_ms: 15000

# --- 4. 集群节点 2 (加入已有集群) ---
# ledis:
#   server:
#     port: 6380
#   cluster:
#     enabled: true
#     port: 16380
#     seeds: "192.168.1.100:16379"

# --- 5. 高性能模式 (多线程 epoll) ---
