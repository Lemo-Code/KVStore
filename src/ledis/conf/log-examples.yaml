# ============================================================
# 日志配置示例 (zero::LogConfig YAML 格式)
# ============================================================
# 使用方式:
#   1. 独立加载: LogConfig::LoadFromYamlFile("log.yaml")
#   2. 与应用配置合并: 放在 ledis.yaml 的 log: 段即可
# ============================================================

# ----------------------------------------------------------
# 示例 1: 最小配置 (开箱即用)
# ----------------------------------------------------------
# log:
#   root_level: INFO
#
# 效果: 控制台彩色输出, INFO 级别

# ----------------------------------------------------------
# 示例 2: 开发环境 (DEBUG + 简洁格式)
# ----------------------------------------------------------
# log:
#   root_level: DEBUG
#   appenders:
#     - type: console
#       color: true
#       pattern: "%d{%H:%M:%S} [%p] [%N] %C%m%n%C"
#       # %C = 彩色包裹, %N = logger 名, %m = 消息, %n = 换行

# ----------------------------------------------------------
# 示例 3: 生产环境 (双 appender: 控制台 + 文件)
# ----------------------------------------------------------
log:
  root_level: INFO
  appenders:
    # 控制台: 简洁格式 + 彩色
    - type: console
      color: true
      level: WARN          # 控制台只显示 WARN+
      pattern: "%d{%H:%M:%S} [%p] %m%n"

    # 文件: 详细格式 + 全级别
    - type: file
      file: /var/log/myapp/app.log
      max_size: 104857600   # 100MB
      max_files: 10
      level: DEBUG         # 文件记录 DEBUG+
      pattern: "%d{%Y-%m-%d %H:%M:%S} [%p] [%t:%F] [%f:%l] %m%n"

# ----------------------------------------------------------
# 示例 4: 按模块分离日志 (命名 logger)
# ----------------------------------------------------------
# log:
#   root_level: INFO
#   appenders:
