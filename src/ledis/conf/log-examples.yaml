#           file: /var/log/myapp/db.log
#           max_size: 52428800
#           max_files: 3

# ----------------------------------------------------------
# 示例 5: 热加载 (运行时修改日志级别)
# ----------------------------------------------------------
# 代码中调用 LogConfig::EnableHotReload() 后:
#   $ ./myapp --config conf/app.yaml &
#   $ vim conf/app.yaml          # 改 log.root_level: DEBUG
#   $ kill -HUP <pid>            # 或程序定时 reload

# ----------------------------------------------------------
# Appender 类型
# ----------------------------------------------------------
# console    - 控制台 (支持 ANSI 彩色)
#   pattern: "%d{%H:%M:%S} [%p] [%N] %m%n"
#   color: true/false
#
# file       - 文件 (支持按大小滚动)
#   file: /path/to/log
#   max_size: 104857600  (字节, 0=不滚动)
#   max_files: 10        (保留文件数)
#
# daily_file - 按天滚动文件
#   file: /path/to/log   (自动加 .YYYYMMDD 后缀)
#
# 所有 appender 通用属性:
#   level: DEBUG  (此 appender 的最低输出级别)
#   pattern: "..."  (LogFormatter 格式)

# ----------------------------------------------------------
# LogFormatter 格式占位符
# ----------------------------------------------------------
# %d{...}   - 日期时间 (strftime 格式), 如 %d{%H:%M:%S}
# %p        - 日志级别 (TRACE/DEBUG/INFO/WARN/ERROR/FATAL)
# %t        - 线程 ID
# %F        - 协程/fiber ID
# %N        - Logger 名称
# %f        - 源文件名
# %l        - 行号
# %m        - 日志消息
# %n        - 换行
# %C        - 彩色开始/结束 (仅 console)
# %X{key}   - MDC 值 (如 request_id)
# %%        - 百分号
