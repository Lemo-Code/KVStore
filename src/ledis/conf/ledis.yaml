# ============================================================
# Ledis — Redis-Compatible KV Store 完整配置文件
# ============================================================
# 加载: ./ledis-server --config conf/ledis.yaml
#
# 约定优于配置: 所有配置项都有默认值，此文件只列出可覆盖项。
# 未显式配置的项使用代码中的约定默认值。
# ============================================================

# ============================================================
# 1. 日志 (zero::LogConfig 读取)
# ============================================================
log:
  # 根日志级别: TRACE | DEBUG | INFO | WARN | ERROR | FATAL
  root_level: INFO

  # 异步日志: off | thread | coroutine
  async:
    policy: off

  # 日志输出器
  appenders:
    console:
      enabled: true
      color: true
      pattern: "%d{%Y-%m-%d %H:%M:%S} [%p] [%t] [%F:%l] %m%n"

    file:
      path: ""                 # 空 = 不写文件
      max_size: 104857600      # 100MB 自动滚动
      max_files: 10            # 保留最近 10 个
      pattern: "%d{%Y-%m-%d %H:%M:%S} [%p] [%t] [%F:%l] %m%n"

# ============================================================
# 2. 协程 (zero::Fiber / zero::FiberPool)
# ============================================================
fiber:
  stack_size: 131072           # 默认栈大小 (字节)
  pool_size: 1024              # FiberPool 预分配数量

# ============================================================
# 3. 调度器 (zero::Scheduler)
# ============================================================
scheduler:
  threads: 4                   # 默认工作线程数 (ledis 单线程模式覆盖为 1)
  use_caller: false            # 是否复用调用线程
  name: zero                   # 调度器名称

# ============================================================
# 4. Socket (zero::Socket)
# ============================================================
socket:
  connect_timeout_ms: 5000     # TCP 连接超时
  recv_timeout_ms: 5000        # TCP 接收超时 (0=无限)
  send_timeout_ms: 5000        # TCP 发送超时 (0=无限)
  tcp_no_delay: true           # 禁用 Nagle 算法
  so_reuseaddr: true           # 端口复用
  listen_backlog: 128          # listen() backlog (SOMAXCONN)

# ============================================================
# 5. Reactor (zero::Reactor) — epoll 事件循环
# ============================================================
reactor:
  poll_timeout_ms: 10          # epoll_wait 超时 (-1=无限)
  max_events: 256              # 每次最多返回事件数

# ============================================================
# 6. TcpServer (zero::TcpServer)
# ============================================================
tcpserver:
  keepalive: 1                 # SO_KEEPALIVE (0=关, 1=开)
  timeout_ms: 120000           # 连接空闲超时 (0=不超时)

# ============================================================
# 7. Ledis 服务器
# ============================================================
ledis:
  server:
    port: 6379
    bind: "0.0.0.0"
    io_threads: 1              # 1=v2 fiber, >=2=v5 epoll
    engine: ""                 # ""=auto, "epoll", "uring"
    requirepass: ""            # 空=无密码 (AUTH 使用)
    recv_buf_size: 65536       # 客户端接收缓冲

  # 主动过期扫描轮数
  active_expire_cycles: 16

  # ACL 多用户
  acl:
    users: {}                  # {username: password, ...}

  # AOF 持久化
  aof:
    path: ""                   # 空=禁用
    mode: everysec             # always | everysec | no

  # 慢日志
  slowlog:
    max_len: 128               # 最大条目数
    threshold_us: 10000        # 慢查询阈值 (微秒)

  # 内存淘汰
  eviction:
    maxmemory: 0               # 0=不限制
    policy: noeviction         # noeviction | allkeys-lru | volatile-lru | allkeys-random | volatile-random | volatile-ttl
    samples: 20                # 每次淘汰采样数

  # 集群
  cluster:
    enabled: false
    port: 0                    # 0 = server.port + port_offset
    port_offset: 10000
    seeds: ""                  # "ip:port,..."
    replicas: 0
    gossip_interval_ms: 1000   # 心跳间隔
    node_timeout_ms: 15000     # 故障超时


# ============================================================
# 场景快速切换 (取消注释对应段, 注释默认段)
# ============================================================

