# lemo 配置模块完整测试用例
# 覆盖：通用 ConfigCenter + 日志装配 log.*

# ── 通用配置（需测试代码中 Lookup 声明后才生效）──
server.port = 9090
server.name = kvstore

# ── root logger ──
log.level = WARN
log.pattern = %m
log.appender = file
log.file.path = /tmp/lemo_config_full_test.log

# ── file / rolling / async 参数 ──
log.file.max_bytes = 1048576
log.file.max_files = 5
log.file.roll_interval = none
log.async.delegate = file
log.console.target = stdout

# ── 命名 logger（点分 name）──
log.logger.com.example.level = DEBUG
log.logger.com.example.additive = false
log.logger.net.io.level = ERROR
log.logger.net.io.additive = true

# 以下 key 未在测试中 Lookup，应被忽略
ignored.key = should_not_apply
