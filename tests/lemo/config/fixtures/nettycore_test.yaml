# LemoNettyCore 完整配置示例（YAML）
# 嵌套结构会打平为 server.port、log.level 等 key

server:
  name: echo
  host: 0.0.0.0
  port: 9000

io:
  threads: 4
  use_caller: false
  name: main

fiber:
  stackpool:
    max_tls_cached: 32
    max_global_cached: 64

log:
  level: INFO
  pattern: "%d{%Y-%m-%d %H:%M:%S} [%p] %c %m"
  appender: console
  console:
    target: stdout
  file:
    path: /tmp/nettycore_demo.log
    max_bytes: 1048576
    max_files: 3
    roll_interval: none
  async:
    delegate: file
    worker_name: nettycore-log-async
  logger:
    net:
      io:
        level: DEBUG
        additive: true
    server:
      level: INFO
      additive: false

# 未 Lookup 的 key 会被忽略
ignored:
  key: not_applied
