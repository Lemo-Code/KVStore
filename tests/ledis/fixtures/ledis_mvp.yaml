# =============================================================================
# Ledis 集成测试 / 文档示例配置
# =============================================================================
#
# 用法：
#   ./bin/Ledis/ledis-server --config tests/ledis/fixtures/ledis_mvp.yaml
#
# 与 ledis/conf/ledis.yaml 字段一致，端口改为 16379 避免与默认 6379 冲突。
# 完整注释版见 ledis/conf/ledis.yaml；字段说明见 docs/ledis/configuration.md
# =============================================================================

server:
  host: 127.0.0.1       # 绑定地址
  port: 16379           # 测试端口（默认配置为 6379）

io:
  threads: 1            # IO worker 数；仅 --async 模式有效

ledis:
  single_thread_mode: true      # true=单线程；false 等价 --async
  io_threads: 1                 # 同 io.threads
  maxclients: 10000             # 最大连接；0=不限
  max_pending_commands: 65536   # 异步入队上限
  query_buffer_limit: 1048576   # 读缓冲上限（字节）；0=不限
  maxmemory: 0                  # 最大内存（字节）；0=不限
  maxmemory_policy: allkeys-lru # allkeys-lru | volatile-lru | allkeys-lfu | volatile-lfu
  requirepass: ""               # 非空需 AUTH
  active_expire_enabled: true   # DB 线程主动过期
  active_expire_cycle_keys: 20  # 每轮每 DB 最多删过期 key 数
  dir: "."                      # 工作目录；启动 chdir
  dbfilename: dump.ledis        # RDB-lite 文件名
  appendonly: false             # 是否开启 AOF-lite
  appendfilename: appendonly.aof
  appendfsync: everysec         # always | everysec | no
