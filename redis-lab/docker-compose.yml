version: '3.8'

services:
  # ============================================================
  # Redis 实例 1: 服务端存储 (Go 后端自身数据: session/cache)
  # ============================================================
  redis-storage:
    image: redis:7-alpine
    container_name: redislab-storage
    ports:
      - "6379:6379"
    volumes:
      - redis-storage-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped

  # ============================================================
  # Redis 实例 2: 用户学习目标 (学习者操作的 Redis)
  # ============================================================
  redis-learn:
    image: redis:7-alpine
    container_name: redislab-learn
    ports:
      - "6380:6379"
    volumes:
      - redis-learn-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped

  # ============================================================
  # Go 后端 — 多租户 Redis 沙箱网关
  # ============================================================
  backend:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/data/redislab.db

      # 服务端 Redis (Go 后端自己的存储)
      - STORAGE_REDIS_HOST=redis-storage
      - STORAGE_REDIS_PORT=6379

      # 学习 Redis (用户通过代理操作的目标)
      - LEARN_REDIS_HOST=redis-learn
      - LEARN_REDIS_PORT=6379

      - JWT_SECRET=change-me-in-production
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.anthropic.com}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-6}
    volumes:
      - redis-lab-data:/data
    depends_on:
      - redis-storage
      - redis-learn
    restart: unless-stopped

  # ============================================================
  # 前端 — Nginx 静态文件 + API/WS 反向代理
  # ============================================================
  frontend:
    build:
      context: ./web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-storage-data:
  redis-learn-data:
  redis-lab-data:
